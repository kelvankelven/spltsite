<!DOCTYPE html>
<html>
<head>
    <title>File Splitter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        /* Paste the CSS from my previous style.css here */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .upload-area { border: 3px dashed #007bff; padding: 50px; text-align: center; cursor: pointer; }
        .file-list { margin-top: 20px; }
        .file-item { background: #f8f9fa; padding: 15px; margin: 10px 0; border-radius: 5px; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>XLSX/CSV Splitter (Client-Side)</h1>
    <div class="upload-area" onclick="document.getElementById('file').click()">
        <p>Click or drag XLSX/CSV file</p>
        <input type="file" id="file" accept=".xlsx,.csv" style="display:none" onchange="handleFile()">
        <input type="number" id="parts" value="10" min="1" max="50" style="margin:10px; padding:5px;">
        <br><button onclick="splitFile()">Split File</button>
    </div>
    <div id="progress" style="display:none">Processing...</div>
    <div id="results" class="file-list"></div>

    <script>
    let workbookData;
    
    function handleFile() {
        const file = document.getElementById('file').files[0];
        if (!file) return;
        
        const reader = new FileReader();
        reader.onload = (e) => {
            const data = new Uint8Array(e.target.result);
            workbookData = XLSX.read(data, {type: 'array'});
            document.getElementById('progress').style.display = 'block';
        };
        reader.readAsArrayBuffer(file);
    }
    
    function splitFile() {
        if (!workbookData) return alert('Upload file first');
        
        const numParts = parseInt(document.getElementById('parts').value);
        const sheet = workbookData.Sheets[workbookData.SheetNames[0]];
        const jsonData = XLSX.utils.sheet_to_json(sheet, {header:1});
        
        const rowsPerPart = Math.ceil(jsonData.length / numParts);
        const results = document.getElementById('results');
        results.innerHTML = '';
        
        for (let i = 0; i < numParts; i++) {
            const start = i * rowsPerPart;
            const end = Math.min(start + rowsPerPart, jsonData.length);
            const partData = jsonData.slice(start, end);
            
            const partWb = XLSX.utils.book_new();
            const partWs = XLSX.utils.aoa_to_sheet(partData);
            XLSX.utils.book_append_sheet(partWb, partWs, 'Sheet1');
            
            const partBlob = new Blob([XLSX.write(partWb, {bookType:'xlsx', type:'array'})], 
                                    {type:'application/octet-stream'});
            const url = URL.createObjectURL(partBlob);
            
            results.innerHTML += `
                <div class="file-item">
                    <strong>Part ${i+1}</strong> (${partData.length} rows)
                    <a href="${url}" download="part_${i+1}.xlsx" style="margin-left:20px">Download</a>
                </div>
            `;
        }
        
        document.getElementById('progress').style.display = 'none';
    }
    </script>
</body>
</html>
